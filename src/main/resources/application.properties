# --- Upload Settings ---
# These are essential for file uploads, especially profile pictures and attachments
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads/

# --- Thymeleaf Settings ---
# Disable caching for development so changes reflect immediately without restarting
spring.thymeleaf.cache=false

# --- Logging Configuration ---
# Set logging levels to see what's happening internally
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# --- H2 Settings ---
# H2 console is kept enabled
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# NOTE: In the H2 login screen, use this JDBC URL: jdbc:h2:file:./data/examdb
# The credentials are: sa / password

# --- JPA/Hibernate Settings ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Security Session Settings ---
# Set the session timeout (in minutes)
server.servlet.session.timeout=30m

# --- Application-specific settings ---
spring.application.name=online-exam
server.port=7890

