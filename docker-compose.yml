version: '3.8'

services:
  web-app:
    build: .
    ports:
      - "7890:7890"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - SERVER_PORT=7890
      - SPRING_DATASOURCE_URL=jdbc:h2:file:./data/examdb
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=password
      - FILE_UPLOAD_DIR=./uploads/
    restart: always
